<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="oculto1.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">SoliciTec</h1>
            <p class="subtitle">Accede a tu cuenta o crea una nueva.</p>

            <div class="fomularios">
                <form id="form1" action="alta.php" method="post">
                    <input type="text" placeholder="Email" name="ema">
                    <input type="password" placeholder="Contraseña" name="pass">
                    <div class="actions">
                        <button class="primary" type="submit" name="sesion">Iniciar sesión</button>
                        <button class="secondary" type="button" onclick="mostrar2()">Crear cuenta</button>
                    </div>
                </form>

                <form id="form2" class="oculto1" action="alta.php" method="post">
                    <input type="text" placeholder="Nombre de usuario" name="nom1">
                    <input type="text" placeholder="Apellido" name="ape1">
                    <input type="email" placeholder="Email" name="ema">
                    <input type="password" placeholder="Contraseña" name="pass1">
                    <div class="actions">
                        <button class="primary" type="submit" name="agre">Crear cuenta</button>
                        <button class="secondary" type="button" onclick="mostrar2()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('mouseover', initLandbot, { once: true });
        window.addEventListener('touchstart', initLandbot, { once: true });
        var myLandbot;
        function initLandbot() {
          if (!myLandbot) {
            var s = document.createElement('script');
            s.type = "module"
            s.async = true;
            s.addEventListener('load', function() {
              myLandbot = new Landbot.Popup({
                configUrl: 'https://storage.googleapis.com/landbot.online/v3/H-2543509-KCB8QPTYPZI8ZA65/index.json',
              });
            });
            s.src = 'https://cdn.landbot.io/landbot-3/landbot-3.0.0.mjs';
            var x = document.getElementsByTagName('script')[0];
            x.parentNode.insertBefore(s, x);
          }

    
        }

        
    let palabrasProhibidas = ['gay', 'mierda', 'puta', 'puto', 'pelotudo', 'boludo', 'hijo de puta', 'hija de puta', 'cabron', 'cabrona', 'pendejo', 'pendeja', 'idiota', 'imbecil', 'estupido', 'estupida'];
    
    let formRegistro = document.getElementById("form2");
    
    let inputs = formRegistro.querySelectorAll("input");
    
    let botonCrear = formRegistro.querySelector("button[name='agre']");


    function contienePalabraProhibida(texto) {
        texto = texto.toLowerCase();

        for (let i = 0; i < palabrasProhibidas.length; i++) {
            if (texto.includes(palabrasProhibidas[i])) {
                return true;
            }
        }

        return false;
           
        
    }


    function validarFormulario() {

        let invalido = false;

        for (let i = 0; i < inputs.length; i++) {

            if (contienePalabraProhibida(inputs[i].value)) {
                invalido = true;
            }
        }
        if (invalido) {
            botonCrear.disabled = true;
            botonCrear.textContent = "Contenido no permitido";
            } else {
                botonCrear.disabled = false;
                botonCrear.textContent = "Crear cuenta";
            }
    }


    for (let i = 0; i < inputs.length; i++) {
        inputs[i].addEventListener("input", validarFormulario);
    }

        </script>
    <script src="js.js"></script>
</body>
</html>
